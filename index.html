<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajude o Kaique</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:#161b22;
    width:360px;
    padding:30px;
    border-radius:16px;
    text-align:center;
    border:1px solid #30363d;
}

h1{
    color:#58a6ff;
    margin-bottom:10px;
}

p{
    color:#c9d1d9;
    margin-bottom:20px;
}

.qr{
    width:220px;
    height:220px;
    margin:20px auto;
    background:#21262d;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#8b949e;
}

.qr img{
    width:100%;
    height:100%;
    object-fit:contain; /* Mantém o QR inteiro */
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#238636;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}
</style>
</head>
<body>

<div class="card">

<h1>💚 Ajude o Kaique</h1>

<p>Clique no botão abaixo para copiar o código Pix.</p>

<div class="qr">
    <img src="imagem/qrcode.jpeg" alt="imagem">
</div>

<button onclick="copiarPix()">
📋 Copiar código Pix
</button>

</div>

<script>
// Substitua pelo seu código Pix Copia e Cola
const codigoPix = "pkaique926@gmail.com";

async function copiarPix() {
    try {
        await navigator.clipboard.writeText(codigoPix);
        alert("Código Pix copiado!");
    } catch {
        alert("Não foi possível copiar o código.");
    }
}
</script>

</body>
</html>
